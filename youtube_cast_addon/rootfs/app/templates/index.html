<!DOCTYPE html>
<html lang="vi" data-theme="auto">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="YouTube Music Cinematic - Phát nhạc YouTube với giao diện cao cấp trên Home Assistant">
    <title>YouTube Music Cinematic</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<!-- ===== DEVICE SELECTOR ===== -->
<div id="deviceModal" class="modal-overlay hidden">
    <div class="modal-content">
        <div class="modal-header">
            <h2>🔊 Chọn thiết bị phát</h2>
            <button class="modal-close" onclick="closeDeviceModal()">✕</button>
        </div>
        <div class="modal-body">
            <div class="device-list" id="deviceList">
                <div class="loading-spinner"><div class="spinner"></div></div>
            </div>
        </div>
    </div>
</div>

<!-- ===== PLAY VIEW (FULL SCREEN) ===== -->
<div id="playView" class="play-view hidden">
    <!-- Background blur -->
    <div class="play-bg" id="playBg"></div>
    <div class="play-bg-overlay"></div>

    <!-- Header -->
    <div class="play-header">
        <button class="btn-icon" id="btnClosePlay" onclick="closePlayView()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M19 12H5M12 5l-7 7 7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
        <span class="play-header-title">Đang phát</span>
        <!-- Nút chọn đầu ra - góc trên phải -->
        <button class="btn-play-device" id="btnPlayDevice" onclick="openDeviceModal()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" stroke="currentColor" stroke-width="2" fill="currentColor"/>
                <path d="M15.54 8.46a5 5 0 0 1 0 7.07" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <span id="playDeviceName">Điện thoại</span>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
                <polyline points="6 9 12 15 18 9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </button>
    </div>

    <!-- Scrollable content -->
    <div class="play-scroll-container" id="playScrollContainer">
        <!-- Thumbnail -->
        <div class="play-thumb-container">
            <div class="play-thumb-wrapper" id="playThumbWrapper">
                <img id="playThumb" src="" alt="Album art" class="play-thumb">
                <div class="play-thumb-shadow"></div>
            </div>
        </div>

        <!-- Track info -->
        <div class="play-track-info">
            <h2 class="play-title" id="playTitle">Chưa có bài hát</h2>
            <p class="play-artist" id="playArtist">—</p>
        </div>

        <!-- Progress bar -->
        <div class="play-progress-section">
            <div class="progress-bar-container" id="progressContainer" onclick="seekTo(event)">
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progressFill"></div>
                    <div class="progress-dot" id="progressDot"></div>
                </div>
            </div>
            <div class="progress-times">
                <span id="currentTime">0:00</span>
                <span id="totalTime">0:00</span>
            </div>
        </div>

        <!-- Controls row - compact -->
        <div class="play-controls-compact">
            <button class="ctrl-btn ctrl-btn-sm" id="btnShuffle" onclick="toggleShuffle()" title="Phát ngẫu nhiên">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                    <polyline points="16 3 21 3 21 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <line x1="4" y1="20" x2="21" y2="3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <polyline points="21 16 21 21 16 21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <line x1="15" y1="15" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>

            <button class="ctrl-btn ctrl-btn-md" id="btnPrev" onclick="playPrev()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <polygon points="19 20 9 12 19 4 19 20"/>
                    <line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>

            <button class="ctrl-btn ctrl-btn-play" id="btnPlayPause" onclick="togglePlayPause()">
                <svg id="iconPlay" width="32" height="32" viewBox="0 0 24 24" fill="currentColor" class="hidden">
                    <polygon points="5 3 19 12 5 21 5 3"/>
                </svg>
                <svg id="iconPause" width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
                    <rect x="6" y="4" width="4" height="16" rx="1"/>
                    <rect x="14" y="4" width="4" height="16" rx="1"/>
                </svg>
                <svg id="iconLoading" width="32" height="32" viewBox="0 0 24 24" class="hidden spin">
                    <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" fill="none" stroke-dasharray="50" stroke-dashoffset="20"/>
                </svg>
            </button>

            <button class="ctrl-btn ctrl-btn-md" id="btnNext" onclick="playNext()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <polygon points="5 4 15 12 5 20 5 4"/>
                    <line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>

            <button class="ctrl-btn ctrl-btn-sm" id="btnRepeat" onclick="toggleRepeat()" title="Lặp lại">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                    <polyline points="17 1 21 5 17 9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <path d="M3 11V9a4 4 0 0 1 4-4h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <polyline points="7 23 3 19 7 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <path d="M21 13v2a4 4 0 0 1-4 4H3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
        </div>

        <!-- Volume control -->
        <div class="play-volume">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" class="volume-icon">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" stroke="currentColor" stroke-width="2" fill="currentColor"/>
            </svg>
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="70"
                oninput="setVolume(this.value)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" class="volume-icon">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" stroke="currentColor" stroke-width="2" fill="currentColor"/>
                <path d="M15.54 8.46a5 5 0 0 1 0 7.07" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </div>


        <!-- Extra space at bottom for safe area -->
        <div style="height: 2rem;"></div>
    </div>
</div>

<!-- ===== MAIN APP ===== -->
<div id="mainApp" class="main-app">
    <!-- Top bar -->
    <header class="app-header">
        <div class="header-left">
            <div class="app-logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
                    <rect width="24" height="24" rx="6" fill="#FF0000"/>
                    <polygon points="10 8 16 12 10 16 10 8" fill="white"/>
                </svg>
                <span class="app-name">YT Music</span>
            </div>
        </div>
        <div class="header-right">
            <button class="btn-device" id="btnSelectDevice" onclick="openDeviceModal()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" stroke="currentColor" stroke-width="2" fill="currentColor"/>
                    <path d="M15.54 8.46a5 5 0 0 1 0 7.07" stroke="currentColor" stroke-width="2"/>
                </svg>
                <span id="selectedDeviceName">Chọn thiết bị</span>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
                    <polyline points="6 9 12 15 18 9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
            <button class="btn-icon-sm" onclick="toggleTheme()" id="themeBtn" title="Đổi theme">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" id="iconMoon">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" stroke="currentColor" stroke-width="2" fill="currentColor"/>
                </svg>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" id="iconSun" class="hidden">
                    <circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="2" fill="currentColor"/>
                    <line x1="12" y1="1" x2="12" y2="3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <line x1="12" y1="21" x2="12" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <line x1="1" y1="12" x2="3" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <line x1="21" y1="12" x2="23" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
        </div>
    </header>

    <!-- Tab bar -->
    <nav class="tab-bar">
        <button class="tab-btn active" data-tab="explore" onclick="switchTab('explore')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/>
                <line x1="21" y1="21" x2="16.65" y2="16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <span>Khám phá</span>
        </button>
        <button class="tab-btn" data-tab="playlist" onclick="switchTab('playlist')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <line x1="8" y1="6" x2="21" y2="6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <line x1="8" y1="12" x2="21" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <line x1="8" y1="18" x2="21" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <line x1="3" y1="6" x2="3.01" y2="6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <line x1="3" y1="12" x2="3.01" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <line x1="3" y1="18" x2="3.01" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <span>Playlist</span>
        </button>
        <button class="tab-btn" data-tab="timer" onclick="switchTab('timer')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
                <polyline points="12 6 12 12 16 14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <span>Hẹn giờ</span>
        </button>
    </nav>

    <!-- Tab content -->
    <main class="tab-content">

        <!-- ===== TAB: EXPLORE ===== -->
        <div id="tab-explore" class="tab-panel active">
            <!-- Search bar -->
            <div class="search-container">
                <div class="search-box">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" class="search-icon">
                        <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <input type="text" id="searchInput" class="search-input" 
                        placeholder="Tìm kiếm bài hát, nghệ sĩ..." 
                        onkeydown="if(event.key==='Enter') doSearch()">
                    <button class="btn-clear-search" id="btnClearSearch" onclick="clearSearch()" style="display:none;">✕</button>
                </div>
                <button class="btn-search" onclick="doSearch()" id="btnSearch">
                    TÌM
                </button>
            </div>

            <!-- Video list -->
            <div id="videoList" class="video-list">
                <div class="loading-spinner" id="listLoading" style="display:none;">
                    <div class="spinner"></div>
                    <span>Đang tìm kiếm...</span>
                </div>
                <div id="videoItems" class="video-items"></div>
                <div id="loadMoreSection" class="load-more-section" style="display:none;">
                    <button class="btn-load-more" onclick="loadMore()">Tải thêm</button>
                </div>
            </div>
        </div>

        <!-- ===== TAB: PLAYLIST ===== -->
        <div id="tab-playlist" class="tab-panel">
            <div class="playlist-header">
                <h2>Danh sách phát</h2>
                <div class="new-playlist-form">
                    <input type="text" id="newPlaylistName" class="input-field" placeholder="Tên playlist mới...">
                    <button class="btn-add-playlist" onclick="createPlaylist()">+</button>
                </div>
            </div>
            <div id="playlistContainer" class="playlist-container">
                <div class="empty-state">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" opacity="0.3">
                        <path d="M9 18V5l12-2v13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <circle cx="6" cy="18" r="3" stroke="currentColor" stroke-width="2"/>
                        <circle cx="18" cy="16" r="3" stroke="currentColor" stroke-width="2"/>
                    </svg>
                    <p>Chưa có playlist nào</p>
                </div>
            </div>
        </div>

        <!-- ===== TAB: TIMER ===== -->
        <div id="tab-timer" class="tab-panel">
            <div class="timer-section">
                <h2>Hẹn giờ tự động</h2>
                <div class="timer-form card">
                    <div class="timer-days">
                        <span class="label">Thứ trong tuần:</span>
                        <div class="days-picker">
                            <button class="day-btn" data-day="1">T2</button>
                            <button class="day-btn" data-day="2">T3</button>
                            <button class="day-btn" data-day="3">T4</button>
                            <button class="day-btn" data-day="4">T5</button>
                            <button class="day-btn" data-day="5">T6</button>
                            <button class="day-btn" data-day="6">T7</button>
                            <button class="day-btn" data-day="0">CN</button>
                        </div>
                    </div>
                    <div class="timer-time">
                        <span class="label">Thời gian:</span>
                        <div class="time-inputs">
                            <input type="number" id="timerHour" class="input-field time-input" min="0" max="23" value="7" placeholder="Giờ">
                            <span>:</span>
                            <input type="number" id="timerMinute" class="input-field time-input" min="0" max="59" value="0" placeholder="Phút">
                        </div>
                    </div>
                    <div class="timer-action">
                        <span class="label">Hành động:</span>
                        <div class="action-picker">
                            <button class="action-btn active" data-action="play" onclick="selectAction('play')">▶ PHÁT</button>
                            <button class="action-btn" data-action="stop" onclick="selectAction('stop')">■ TẮT</button>
                        </div>
                    </div>
                    <div class="timer-sleep" id="sleepTimerSection">
                        <span class="label">Tự tắt sau (phút):</span>
                        <input type="number" id="sleepMinutes" class="input-field" min="0" max="180" value="0" placeholder="0 = không tắt">
                    </div>
                    <button class="btn-primary" onclick="addTimer()">+ Thêm hẹn giờ</button>
                </div>
                <div id="timerList" class="timer-list">
                    <div class="empty-state">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" opacity="0.3">
                            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
                            <polyline points="12 6 12 12 16 14" stroke="currentColor" stroke-width="2"/>
                        </svg>
                        <p>Chưa có hẹn giờ nào</p>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- ===== MINI PLAYER ===== -->
    <div id="miniPlayer" class="mini-player hidden" onclick="openPlayView()">
        <div class="mini-thumb-container">
            <img id="miniThumb" src="" alt="" class="mini-thumb">
        </div>
        <div class="mini-info">
            <p class="mini-title" id="miniTitle">Chưa có bài hát</p>
            <p class="mini-artist" id="miniArtist">—</p>
        </div>
        <div class="mini-controls" onclick.stop>
            <button class="btn-icon-sm" onclick="event.stopPropagation(); togglePlayPause()">
                <svg id="miniIconPlay" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" class="hidden">
                    <polygon points="5 3 19 12 5 21 5 3"/>
                </svg>
                <svg id="miniIconPause" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <rect x="6" y="4" width="4" height="16" rx="1"/>
                    <rect x="14" y="4" width="4" height="16" rx="1"/>
                </svg>
            </button>
            <button class="btn-icon-sm" onclick="event.stopPropagation(); playNext()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <polygon points="5 4 15 12 5 20 5 4"/>
                    <line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
        </div>
        <div class="mini-progress-bar">
            <div class="mini-progress-fill" id="miniProgressFill"></div>
        </div>
    </div>

</div>

<!-- Audio element for phone playback -->
<audio id="audioPlayer" preload="none"></audio>

<!-- Add to playlist modal -->
<div id="addToPlaylistModal" class="modal-overlay hidden">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Thêm vào Playlist</h2>
            <button class="modal-close" onclick="closeAddToPlaylistModal()">✕</button>
        </div>
        <div class="modal-body" id="playlistPickerList">
            <div class="empty-state">Chưa có playlist nào</div>
        </div>
    </div>
</div>

<script src="/static/js/app.js"></script>
</body>
</html>
